<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pelican State PM Dashboard</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: white;
      }
      #root {
        display: none;
      }
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f5f5;
        font-family: system-ui;
      }
      .loading-content {
        text-align: center;
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #ddd;
        border-top-color: #143352;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 24px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      p {
        color: #666;
        margin: 0;
      }
      .error {
        color: #d32f2f;
        padding: 20px;
        background: #fff3cd;
        border: 1px solid #ffc107;
        border-radius: 4px;
        max-width: 500px;
        white-space: pre-wrap;
        font-family: monospace;
        font-size: 12px;
      }
    </style>
    <script>
      console.log('Page loading...');
      window.__startTime__ = Date.now();
      
      // Fallback in case React fails
      window.__showError__ = function(msg) {
        document.body.innerHTML = '<div class="loading-screen"><div class="loading-content"><div class="error">ERROR:\n\n' + msg + '</div></div></div>';
        console.error('Application Error:', msg);
      };

      // Safety timeout
      setTimeout(function() {
        if (!window.__appLoaded__) {
          window.__showError__('Application failed to load within 10 seconds.\n\nCheck browser console for details.');
        }
      }, 10000);
    </script>
  </head>
  <body>
    <div class="loading-screen">
      <div class="loading-content">
        <div class="spinner"></div>
        <p>Loading application...</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module">
      import('./src/main.tsx').catch(function(err) {
        window.__showError__(err.toString() + '\n\n' + (err.stack || ''));
      });
      window.__appLoaded__ = true;
    </script>
  </body>
</html>
