<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pelican State PM Dashboard</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: white;
      }
      #root {
        display: none;
      }
      #app-loaded {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: white;
        padding: 40px;
        z-index: 9999;
      }
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f5f5;
        font-family: system-ui;
      }
      .loading-content {
        text-align: center;
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #ddd;
        border-top-color: #143352;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 24px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      p {
        color: #666;
        margin: 0;
      }
    </style>
    <script>
      window.__reactError__ = null;
      window.__reactLoaded__ = false;
      console.log('[Page Init] Starting...');
      
      // Show success message when React mounts
      window.__onAppReady__ = function() {
        console.log('[App Ready] React mounted successfully');
        document.getElementById('loading').style.display = 'none';
        document.getElementById('app-loaded').style.display = 'block';
        window.__reactLoaded__ = true;
      };
      
      // Fallback error handler
      window.__showReactError__ = function(msg) {
        window.__reactError__ = msg;
        console.error('[React Error]', msg);
        document.getElementById('app-loaded').innerHTML = '<div style="color: red; white-space: pre-wrap; font-family: monospace;"><h2>React Error:</h2>' + msg + '</div>';
        document.getElementById('loading').style.display = 'none';
        document.getElementById('app-loaded').style.display = 'block';
      };
      
      // Safety timeout - if React hasn't loaded in 5 seconds, show fallback
      setTimeout(function() {
        if (!window.__reactLoaded__ && !window.__reactError__) {
          window.__showReactError__('App initialization took too long (>5s).\n\nCheck browser console for details.');
        }
      }, 5000);
    </script>
  </head>
  <body>
    <div id="loading" class="loading-screen">
      <div class="loading-content">
        <div class="spinner"></div>
        <p>Loading application...</p>
      </div>
    </div>
    <div id="app-loaded" style="display: none;">
      <h1>✅ App is initializing...</h1>
      <p>React has not yet rendered content. This is a sign something is wrong.</p>
    </div>
    <div id="root"></div>
    <script type="module">
      console.log('[React Init] Starting React module...');
      try {
        import('./src/main.tsx').then(() => {
          console.log('[React Init] Main module imported successfully');
          window.__onAppReady__();
        }).catch((err) => {
          console.error('[React Init] Error importing main:', err);
          window.__showReactError__(String(err));
        });
      } catch (err) {
        console.error('[React Init] Error starting module:', err);
        window.__showReactError__(String(err));
      }
    </script>
  </body>
</html>
